<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>変動金利耐性チェック｜5問でわかる金利上昇リスク診断</title>
  <meta name="description" content="5つの質問に答えるだけ。変動金利上昇に対するあなたのローンの耐性を無料でチェック。">
  <meta property="og:title" content="変動金利耐性チェック｜5問で診断">
  <meta property="og:description" content="金利が上がったとき、あなたのローンは大丈夫？3分で診断。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Intro ── -->
  <div id="screen-intro" class="screen active">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="intro-content">
      <div class="eyebrow">📊 金利上昇リスク診断</div>
      <h1>変動金利、<br><span class="highlight">あなたは<br>大丈夫？</span></h1>
      <p class="sub">5つの質問に答えるだけで、<br>金利上昇へのローン耐性がわかります。</p>
      <div class="tags">
        <span>所要時間 約3分</span>
        <span>完全無料</span>
        <span>5問のみ</span>
      </div>
      <button class="btn-start" onclick="startQuiz()">診断スタート →</button>
      <p class="no-input">個人情報の入力は不要です</p>
    </div>
  </div>

  <!-- ── Quiz ── -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-top">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="prog-label"><span id="cur-q">1</span><span class="slash">/</span><span>5</span></div>
    </div>
    <div class="quiz-wrap">
      <div class="q-card" id="q-card">
        <div class="q-num" id="q-num">Q1</div>
        <h2 class="q-text" id="q-text"></h2>
        <div class="opts" id="opts"></div>
        <button class="btn-next" id="btn-next" onclick="nextQuestion()">次へ →</button>
      </div>
    </div>
  </div>

  <!-- ── Result ── -->
  <div id="screen-result" class="screen">
    <div class="orb orb-1"></div>
    <div class="result-wrap">
      <p class="res-eyebrow">診断結果</p>

      <div class="gauge-outer">
        <svg viewBox="0 0 200 115" class="gauge-svg" aria-hidden="true">
          <path d="M20,100 A80,80 0 0,1 180,100" class="g-track"/>
          <path d="M20,100 A80,80 0 0,1 180,100" class="g-fill" id="g-fill"/>
        </svg>
        <div class="gauge-center">
          <span class="gauge-num" id="gauge-num">0</span>
          <span class="gauge-denom">/15</span>
        </div>
      </div>

      <div class="res-badge" id="res-badge"></div>
      <h2 class="res-title" id="res-title"></h2>
      <p class="res-body" id="res-body"></p>

      <div class="cta-stack" id="cta-stack"></div>
      <button class="btn-retry" onclick="retryQuiz()">もう一度診断する</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
